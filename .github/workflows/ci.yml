name: CycleVault CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-rust:
    name: Test Soroban contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm32v1-none Target
        run: rustup target add wasm32v1-none

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Downgrade ed25519-dalek to prevent type issues
        run: cargo update -p ed25519-dalek --precise 2.2.0 || cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0

      - name: Run Cargo Tests
        run: cargo test --all

  build-rust:
    name: Build Soroban WASM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm32v1-none Target
        run: rustup target add wasm32v1-none

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Downgrade ed25519-dalek to prevent type issues
        run: cargo update -p ed25519-dalek --precise 2.2.0 || cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0

      - name: Build Contracts (WASM)
        run: cargo build --target wasm32-unknown-unknown --release

  lint-rust:
    name: Lint Rust contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run fmt check
        run: cargo fmt --all -- --check

      - name: Run clippy lint
        run: cargo clippy --all -- -D warnings

  lint-frontend:
    name: Lint + typecheck frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm --prefix frontend ci

      - name: Run Vitest Unit Tests
        run: npm --prefix frontend run test

      - name: Run eslint lint
        run: npm --prefix frontend run lint

      - name: Run TypeScript typecheck
        run: npm --prefix frontend run typecheck

  build-frontend:
    name: Build Next.js frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create mock deployments file for build
        run: |
          mkdir -p deployments
          echo '{"deployer":"GDJBG26ITIHHFQBO7IUKEQZVG3QBVGVD72QC2S4QHCFYKW2WV32NWMI2","merchant":"GA22NVWIW47LEOMLOYUJVOS3SO3CEAJKKJFU4JYKYAO3S2LN7NRDEXAT","subscriber":"GC2XFFGJHQMJGVPBE4NQHTTWK7DXC2DKMBED2K7NEL2UPDPTGMEBIGSE","token_id":"CDNGXULKNHSKXR7KZOSCZINNHXUKAFWFIO7XTZ267IY23MOSWZWUI3KC","registry_id":"CDQQNDJI4CNDQCOT2PFN3Z2T5RGWDILOYR44WTMKZ5M5CNOY3EDOEPB7","vault_id":"CAYBQLDD2ZNQKGWDGFZ4QAPMBJSS6ZGQWIW3WBBRNRA6ZRKRUCAW6ZCC","plan_id":1}' > deployments/testnet.json

      - name: Install Dependencies
        run: npm --prefix frontend ci

      - name: Build Next.js Static Export
        run: npm --prefix frontend run build

  deploy-frontend:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create mock deployments file for build
        run: |
          mkdir -p deployments
          echo '{"deployer":"GDJBG26ITIHHFQBO7IUKEQZVG3QBVGVD72QC2S4QHCFYKW2WV32NWMI2","merchant":"GA22NVWIW47LEOMLOYUJVOS3SO3CEAJKKJFU4JYKYAO3S2LN7NRDEXAT","subscriber":"GC2XFFGJHQMJGVPBE4NQHTTWK7DXC2DKMBED2K7NEL2UPDPTGMEBIGSE","token_id":"CDNGXULKNHSKXR7KZOSCZINNHXUKAFWFIO7XTZ267IY23MOSWZWUI3KC","registry_id":"CDQQNDJI4CNDQCOT2PFN3Z2T5RGWDILOYR44WTMKZ5M5CNOY3EDOEPB7","vault_id":"CAYBQLDD2ZNQKGWDGFZ4QAPMBJSS6ZGQWIW3WBBRNRA6ZRKRUCAW6ZCC","plan_id":1}' > deployments/testnet.json

      - name: Install Dependencies
        run: npm --prefix frontend ci

      - name: Build Next.js Static Export
        run: npm --prefix frontend run build

      - name: Debug Secrets
        run: |
          TOKEN="${{ secrets.CLOUDFLARE_API_TOKEN }}"
          ACCOUNT="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "Token start: ${TOKEN:0:8} ... Token end: ${TOKEN: -5}"
          echo "Account start: ${ACCOUNT:0:5} ... Account end: ${ACCOUNT: -5}"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cyclevault
          directory: frontend/out
